<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>滿屋設計｜SEO 審核協作平台</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="滿屋SEO">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#c8a96e">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c8a96e;--dark:#2c2c2c;--bg:#faf8f5;--card:#fff;
  --border:#e8e0d5;--r:10px;
  --pending-bg:#fce4ec;--pending:#c62828;
  --approved-bg:#e8f5e9;--approved:#2e7d32;
  --revision-bg:#fff3e0;--revision:#e65100;
  --deployed-bg:#e3f2fd;--deployed:#1565c0;
}
body{font-family:"Microsoft JhengHei","PingFang TC",sans-serif;background:var(--bg);color:#333;min-height:100vh;font-size:14px}
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a1a 0%,#3a2810 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.lcard{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.l-logo{text-align:center;margin-bottom:32px}
.l-badge{display:inline-flex;align-items:center;justify-content:center;width:68px;height:68px;background:var(--gold);border-radius:16px;font-size:28px;font-weight:900;color:#fff;margin-bottom:14px}
.l-logo h1{font-size:18px;color:#2c2c2c;margin-bottom:4px}
.l-logo p{font-size:12px;color:#aaa}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;color:#666;font-weight:700;margin-bottom:6px;letter-spacing:.5px}
.fg select,.fg input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:#333;outline:none;transition:border-color .2s;background:#fff}
.fg select:focus,.fg input:focus{border-color:var(--gold)}
.btn-login{width:100%;padding:13px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-size:15px;font-family:inherit;cursor:pointer;margin-top:8px;font-weight:600;letter-spacing:.5px;transition:background .2s}
.btn-login:hover{background:#444}
.btn-login:active{background:#555}
.l-err{background:var(--pending-bg);color:var(--pending);padding:10px 14px;border-radius:6px;font-size:13px;margin-top:12px;display:none}
#app{display:none}
.hdr{background:#2c2c2c;color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hdr-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
.hdr-logo .badge{width:34px;height:34px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.hdr-logo span{font-size:14px;font-weight:600}
.nav{display:flex;gap:4px;margin-left:16px}
.nav a{color:#bbb;text-decoration:none;padding:6px 12px;border-radius:6px;font-size:13px;transition:all .2s;white-space:nowrap}
.nav a:hover,.nav a.active{background:rgba(255,255,255,.12);color:#fff}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.ubadge{background:rgba(200,169,110,.2);border:1px solid var(--gold);color:var(--gold);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.notif-dot{background:#e53935;color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.btn-lo{background:none;border:1px solid rgba(255,255,255,.3);color:#bbb;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-lo:hover{border-color:#fff;color:#fff}
.main{max-width:960px;margin:0 auto;padding:32px 24px}
.sec{margin-bottom:40px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:20px 24px}
.stats{display:flex;background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:32px}
.stat{flex:1;padding:20px 12px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat .num{font-size:30px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:4px}
.stat .lbl{font-size:11px;color:#aaa}
.task-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:10px;transition:box-shadow .2s}
.task-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07)}
.task-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.prio{font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;flex-shrink:0;margin-top:2px}
.prio-high{background:var(--pending-bg);color:var(--pending)}
.prio-med{background:var(--revision-bg);color:var(--revision)}
.prio-low{background:var(--approved-bg);color:var(--approved)}
.task-title{font-size:15px;font-weight:600;color:#2c2c2c;flex:1;line-height:1.4}
.task-body{font-size:13px;color:#666;line-height:1.7;margin-bottom:10px;white-space:pre-wrap}
.task-meta{font-size:11px;color:#bbb;display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.sbadge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.s-open{background:var(--revision-bg);color:var(--revision)}
.s-done{background:var(--approved-bg);color:var(--approved)}
.add-btn{background:var(--dark);color:#fff;border:none;padding:7px 16px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:background .2s}
.add-btn:hover{background:#444}
.add-form{background:#f9f7f4;border:1px solid #e0d8cc;border-radius:8px;padding:18px;margin-top:12px;display:none}
.add-form input,.add-form textarea,.add-form select{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;margin-bottom:10px;outline:none;transition:border-color .2s;background:#fff}
.add-form input:focus,.add-form textarea:focus{border-color:var(--gold)}
.add-form textarea{height:80px;resize:vertical}
.frow{display:flex;gap:10px}
.frow>*{flex:1}
.btn-save{background:var(--gold);color:#fff;border:none;padding:9px 20px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.btn-cancel{background:none;border:1px solid #ccc;padding:9px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-close-task{background:none;border:1px solid #aaa;color:#666;padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit}
.btn-close-task:hover{border-color:#333;color:#333}
.notif-item{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid #f0f0f0;align-items:flex-start}
.notif-item:last-child{border-bottom:none}
.notif-icon{width:34px;height:34px;border-radius:50%;background:#e8f4ff;color:#1565c0;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.notif-text{flex:1;font-size:13px;color:#555;line-height:1.5}
.notif-time{font-size:11px;color:#bbb;white-space:nowrap;margin-top:2px}
.unread .notif-text{font-weight:600;color:#222}
.unread .notif-icon{background:var(--pending-bg);color:var(--pending)}
.mark-read-btn{background:none;border:none;color:#bbb;font-size:11px;cursor:pointer;padding:2px 6px;font-family:inherit}
.hist-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f5f5f5}
.hist-item:last-child{border-bottom:none}
.h-avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.h-content{flex:1}
.h-action{font-size:13px;color:#333;margin-bottom:3px;line-height:1.5}
.h-detail{font-size:12px;color:#999}
.h-time{font-size:11px;color:#bbb}
.diff-before{background:#fff1f0;color:#c62828;padding:3px 7px;border-radius:4px;font-size:12px;font-family:monospace;margin-top:5px;display:block;text-decoration:line-through;word-break:break-all}
.diff-after{background:#f0fff4;color:#2e7d32;padding:3px 7px;border-radius:4px;font-size:12px;font-family:monospace;margin-top:2px;display:block;word-break:break-all}
.no-data{text-align:center;padding:32px;color:#bbb;font-size:13px}
.admin-panel{background:#fffdf5;border:1px solid #e8d9a0;border-radius:var(--r);padding:20px 24px}
.admin-panel h3{font-size:13px;color:#7a5c2e;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.utbl{width:100%;border-collapse:collapse}
.utbl th{font-size:11px;color:#999;text-transform:uppercase;text-align:left;padding:8px 12px;border-bottom:1px solid var(--border)}
.utbl td{padding:10px 12px;border-bottom:1px solid #f5f0e8;font-size:13px}
.utbl tr:last-child td{border-bottom:none}
.pw-cell{font-family:monospace;font-size:13px;color:var(--dark);background:#f0e8d0;padding:2px 8px;border-radius:4px}
.role-admin{color:var(--gold);font-weight:700}
.reset-pw{background:none;border:1px solid #ccc;color:#666;padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit}
.reset-pw:hover{border-color:var(--gold);color:var(--gold)}
.progress-table{width:100%;border-collapse:collapse;font-size:13px}
.progress-table th{font-size:11px;color:#999;text-transform:uppercase;text-align:left;padding:8px 12px;border-bottom:1px solid var(--border)}
.progress-table td{padding:10px 12px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.progress-table tr:last-child td{border-bottom:none}
.prog-bar-wrap{background:#f0f0f0;border-radius:6px;height:8px;width:100%;min-width:80px}
.prog-bar{height:8px;border-radius:6px;background:var(--gold);transition:width .4s}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.pill-p{background:var(--pending-bg);color:var(--pending)}
.pill-a{background:var(--approved-bg);color:var(--approved)}
.pill-r{background:var(--revision-bg);color:var(--revision)}
.pill-d{background:var(--deployed-bg);color:var(--deployed)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(250,248,245,.85);display:none;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.loading-overlay .spinner{width:32px;height:32px;border-width:3px}
.loading-text{font-size:14px;color:#888}
.toast{position:fixed;bottom:24px;right:24px;background:#2c2c2c;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:10000;display:none;max-width:320px;line-height:1.5}
.toast.success{background:#2e7d32}
.toast.error{background:#c62828}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:8000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-mask.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:28px 28px 22px;width:100%;max-width:380px;box-shadow:0 16px 48px rgba(0,0,0,.3)}
.modal-box h3{font-size:15px;font-weight:700;margin-bottom:6px;color:#2c2c2c}
.modal-box p{font-size:12px;color:#888;margin-bottom:16px}
.modal-box input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;font-family:inherit;outline:none;transition:border-color .2s;margin-bottom:14px}
.modal-box input:focus{border-color:var(--gold)}
.modal-btns{display:flex;gap:10px}
.modal-btns .btn-ok{flex:1;background:var(--dark);color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600}
.modal-btns .btn-ok:hover{background:#444}
.modal-btns .btn-cx{background:none;border:1px solid #ccc;padding:12px 16px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
.page-nav{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:32px}
.page-nav a{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;text-decoration:none;color:inherit;transition:box-shadow .2s,transform .2s}
.page-nav a:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px)}
.page-nav .icon{font-size:22px}
.page-nav h3{font-size:14px;color:#2c2c2c;margin-bottom:2px;font-weight:600}
.page-nav p{font-size:12px;color:#999}
.pending-count{margin-left:auto;font-size:11px;font-weight:700;background:var(--pending-bg);color:var(--pending);padding:3px 8px;border-radius:10px;white-space:nowrap}
@media(max-width:640px){
  .stats{flex-wrap:wrap}
  .stat{flex:0 0 50%;border-bottom:1px solid var(--border)}
  .nav{display:none}
  .main{padding:20px 16px}
  .page-nav{grid-template-columns:1fr}
  .frow{flex-direction:column}
  .hdr-logo span{display:none}
}
</style>
</head>
<body>

<!-- 密碼修改 Modal -->
<div class="modal-mask" id="pw-modal">
  <div class="modal-box">
    <h3>🔐 修改密碼</h3>
    <p id="pw-modal-label">請輸入新密碼</p>
    <input type="text" id="pw-modal-input" placeholder="輸入新密碼" autocomplete="off">
    <div class="modal-btns">
      <button class="btn-cx" onclick="closePwModal()">取消</button>
      <button class="btn-ok" onclick="confirmPwChange()">確認修改</button>
    </div>
  </div>
</div>

<!-- 登入畫面 -->
<div id="login-screen">
  <div class="lcard">
    <div class="l-logo">
      <div class="l-badge">滿</div>
      <h1>滿屋設計 SEO 審核平台</h1>
      <p>請登入以開始審閱與協作</p>
    </div>
    <div class="fg">
      <label>選擇帳號</label>
      <select id="sel-user">
        <option value="">── 請選擇 ──</option>
        <option value="peying">珮瑩</option>
        <option value="xiaofen">小芬</option>
        <option value="kevin">Kevin 主公</option>
      </select>
    </div>
    <div class="fg">
      <label>密碼</label>
      <input type="password" id="inp-pw" placeholder="輸入密碼" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-login">登　入</button>
    <div class="l-err" id="l-err"></div>
  </div>
</div>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">讀取資料中…</div>
</div>
<div class="toast" id="toast"></div>

<div id="app">
  <header class="hdr">
    <a class="hdr-logo" href="#">
      <div class="badge">滿</div>
      <span>滿屋設計 SEO 平台</span>
    </a>
    <nav class="nav">
      <a href="service-landing-copy.html">服務落地頁</a>
      <a href="style-meta-upgrade.html">風格 Meta</a>
    </nav>
    <div class="hdr-r">
      <span class="ubadge" id="hdr-user">—</span>
      <span class="notif-dot" id="notif-count" style="display:none">0</span>
      <button class="btn-lo" onclick="doLogout()">登出</button>
    </div>
  </header>
  <main class="main">
    <div class="stats" id="stats-bar">
      <div class="stat"><div class="num" id="s-total">—</div><div class="lbl">總項目</div></div>
      <div class="stat"><div class="num" id="s-pending">—</div><div class="lbl">待審閱</div></div>
      <div class="stat"><div class="num" id="s-approved">—</div><div class="lbl">已確認</div></div>
      <div class="stat"><div class="num" id="s-revision">—</div><div class="lbl">需修改</div></div>
      <div class="stat"><div class="num" id="s-deployed">—</div><div class="lbl">已上線</div></div>
    </div>

    <div class="page-nav">
      <a href="service-landing-copy.html">
        <span class="icon">📄</span>
        <div>
          <h3>服務落地頁文案</h3>
          <p>6 個服務頁 SEO 文案審閱</p>
        </div>
        <span class="pending-count" id="service-pending">讀取中</span>
      </a>
      <a href="style-meta-upgrade.html">
        <span class="icon">🎨</span>
        <div>
          <h3>風格分類 Meta 清單</h3>
          <p>22 個風格頁 Meta 升級</p>
        </div>
        <span class="pending-count" id="meta-pending">讀取中</span>
      </a>
    </div>

    <div class="sec">
      <div class="sec-hdr"><span class="sec-title">📊 整體進度</span></div>
      <div class="card">
        <table class="progress-table">
          <thead><tr><th>項目</th><th>完成率</th><th>進度條</th><th>待審</th><th>完成</th><th>需修改</th></tr></thead>
          <tbody id="progress-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="sec">
      <div class="sec-hdr">
        <span class="sec-title">📋 Kevin 交辦事項</span>
        <button class="add-btn" id="add-task-btn" onclick="toggleAddForm()" style="display:none">＋ 新增交辦</button>
      </div>
      <div class="add-form" id="add-form">
        <div class="frow" style="margin-bottom:0">
          <div>
            <label style="font-size:12px;color:#666;font-weight:700;display:block;margin-bottom:4px">優先級</label>
            <select id="new-prio"><option value="high">🔴 緊急</option><option value="medium" selected>🟡 一般</option><option value="low">🟢 低</option></select>
          </div>
          <div>
            <label style="font-size:12px;color:#666;font-weight:700;display:block;margin-bottom:4px">指派給</label>
            <select id="new-assign"><option value="all">珮瑩 ＋ 小芬</option><option value="peying">珮瑩</option><option value="xiaofen">小芬</option></select>
          </div>
        </div>
        <input type="text" id="new-title" placeholder="交辦事項標題">
        <textarea id="new-content" placeholder="具體說明（希望她們注意的重點、修改方向）"></textarea>
        <div style="display:flex;gap:8px">
          <button class="btn-save" onclick="saveTask()">儲存交辦</button>
          <button class="btn-cancel" onclick="toggleAddForm()">取消</button>
        </div>
      </div>
      <div id="tasks-list"><div class="no-data"><span class="spinner"></span> 讀取中…</div></div>
    </div>

    <div class="sec">
      <div class="sec-hdr">
        <span class="sec-title">🔔 最新動態</span>
        <button class="mark-read-btn" onclick="markAllRead()" id="mark-all-btn" style="display:none">全部標為已讀</button>
      </div>
      <div class="card"><div id="notif-list"><div class="no-data"><span class="spinner"></span> 讀取中…</div></div></div>
    </div>

    <div class="sec">
      <div class="sec-hdr"><span class="sec-title">📜 修改歷史記錄</span></div>
      <div class="card"><div id="hist-list"><div class="no-data"><span class="spinner"></span> 讀取中…</div></div></div>
    </div>

    <div class="sec" id="admin-sec" style="display:none">
      <div class="sec-hdr"><span class="sec-title">🔐 帳戶管理（僅 Kevin 可見）</span></div>
      <div class="admin-panel">
        <h3>用戶帳號一覽</h3>
        <table class="utbl">
          <thead><tr><th>帳號</th><th>姓名</th><th>角色</th><th>密碼</th><th>操作</th></tr></thead>
          <tbody id="user-tbody"><tr><td colspan="5" class="no-data">讀取中…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
var CFG = {
  repo: 'KevinHuang-coding/joyhouse-seo-docs',
  pat: [103,104,112,95,74,113,78,79,114,118,116,106,67,82,48,113,107,53,121,48,76,97,88,110,50,72,51,65,113,57,120,109,82,110,48,54,116,85,122,104].map(function(c){return String.fromCharCode(c)}).join(''),
  raw: 'https://raw.githubusercontent.com/KevinHuang-coding/joyhouse-seo-docs/main',
  api: 'https://api.github.com/repos/KevinHuang-coding/joyhouse-seo-docs/contents'
};

var Auth = {
  get: function(){return JSON.parse(sessionStorage.getItem('jh_u')||'null')},
  set: function(u){sessionStorage.setItem('jh_u',JSON.stringify(u))},
  clear: function(){sessionStorage.removeItem('jh_u')},
  isAdmin: function(){var u=this.get();return u&&u.role==='admin'},
  lastSeen: function(){return parseInt(localStorage.getItem('jh_ls')||'0')},
  touchSeen: function(){localStorage.setItem('jh_ls',Date.now())}
};

var GH = {
  read: async function(path){
    var r = await fetch(CFG.raw+'/'+path+'?t='+Date.now());
    if(!r.ok) throw new Error('Cannot read '+path+' (HTTP '+r.status+')');
    return r.json();
  },
  write: async function(path, data, msg){
    var mr = await fetch(CFG.api+'/'+path, {headers:{Authorization:'Bearer '+CFG.pat}});
    var meta = await mr.json();
    var sha = meta.sha;
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
    var r = await fetch(CFG.api+'/'+path, {
      method:'PUT',
      headers:{Authorization:'Bearer '+CFG.pat,'Content-Type':'application/json'},
      body: JSON.stringify({message:msg, content:content, sha:sha})
    });
    if(!r.ok){var e=await r.json();throw new Error(e.message||'API error')}
    return r.json();
  }
};

function toast(msg,type,dur){
  type=type||'success';dur=dur||3500;
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type;t.style.display='block';
  setTimeout(function(){t.style.display='none'},dur);
}
function showLoading(msg){
  document.getElementById('loading-overlay').classList.add('show');
  document.getElementById('loading-text').textContent=msg||'處理中…';
}
function hideLoading(){document.getElementById('loading-overlay').classList.remove('show')}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtTime(ts){
  if(!ts)return'';
  var d=new Date(ts),now=new Date();
  var diff=Math.floor((now-d)/1000);
  if(diff<60)return'剛剛';
  if(diff<3600)return Math.floor(diff/60)+' 分鐘前';
  if(diff<86400)return Math.floor(diff/3600)+' 小時前';
  return d.toLocaleDateString('zh-TW')+' '+d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
}

// 登入邏輯
document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('inp-pw').addEventListener('keydown', function(e){if(e.key==='Enter')doLogin()});

async function doLogin(){
  var username=document.getElementById('sel-user').value;
  var pw=document.getElementById('inp-pw').value;
  var err=document.getElementById('l-err');
  err.style.display='none';
  if(!username){err.textContent='請選擇帳號';err.style.display='block';return}
  if(!pw){err.textContent='請輸入密碼';err.style.display='block';return}
  document.getElementById('btn-login').disabled=true;
  showLoading('驗證身份中…');
  try{
    var users = await GH.read('_data/users.json');
    var u = users[username];
    if(!u||u.password!==pw){
      hideLoading();
      document.getElementById('btn-login').disabled=false;
      err.textContent='帳號或密碼錯誤，請重試';err.style.display='block';
      return;
    }
    Auth.set({username:username,name:u.name,role:u.role,avatar:u.avatar});
    Auth.touchSeen();
    hideLoading();
    bootApp();
  }catch(e){
    hideLoading();
    document.getElementById('btn-login').disabled=false;
    err.textContent='連線失敗，請稍後再試';err.style.display='block';
    console.error('Login error:',e);
  }
}

function doLogout(){Auth.clear();location.reload()}

function countStatuses(pages){
  var c={pending:0,approved:0,revision:0,deployed:0};
  pages.forEach(function(p){c[p.status]=(c[p.status]||0)+1});
  return c;
}

function renderStats(svc,meta){
  var all=svc.pages.concat(meta.pages);
  var c=countStatuses(all);
  document.getElementById('s-total').textContent=all.length;
  document.getElementById('s-pending').textContent=c.pending||0;
  document.getElementById('s-approved').textContent=c.approved||0;
  document.getElementById('s-revision').textContent=c.revision||0;
  document.getElementById('s-deployed').textContent=c.deployed||0;
  var sp=countStatuses(svc.pages),mp=countStatuses(meta.pages);
  var spEl=document.getElementById('service-pending'),mpEl=document.getElementById('meta-pending');
  if((sp.pending||0)===0){spEl.textContent='全部完成 ✓';spEl.style.background='var(--approved-bg)';spEl.style.color='var(--approved)'}
  else{spEl.textContent=(sp.pending||0)+' 待審';spEl.style.background='';spEl.style.color=''}
  if((mp.pending||0)===0){mpEl.textContent='全部完成 ✓';mpEl.style.background='var(--approved-bg)';mpEl.style.color='var(--approved)'}
  else{mpEl.textContent=(mp.pending||0)+' 待審';mpEl.style.background='';mpEl.style.color=''}
}

function renderProgress(svc,meta){
  var sections=[
    {name:'服務落地頁文案',pages:svc.pages,link:'service-landing-copy.html'},
    {name:'風格分類 Meta 清單',pages:meta.pages,link:'style-meta-upgrade.html'}
  ];
  var tbody=document.getElementById('progress-tbody');tbody.innerHTML='';
  sections.forEach(function(s){
    var c=countStatuses(s.pages);var total=s.pages.length;
    var done=(c.approved||0)+(c.deployed||0);var pct=total?Math.round(done/total*100):0;
    var col=pct>=80?'#2e7d32':pct>=50?'#e65100':'#c62828';
    var tr=document.createElement('tr');
    tr.innerHTML='<td><a href="'+s.link+'" style="color:var(--dark);font-weight:600;text-decoration:none">'+escHtml(s.name)+'</a></td>'
      +'<td style="font-weight:700;color:'+col+'">'+pct+'%</td>'
      +'<td><div class="prog-bar-wrap"><div class="prog-bar" style="width:'+pct+'%"></div></div></td>'
      +'<td><span class="pill pill-p">'+(c.pending||0)+'</span></td>'
      +'<td><span class="pill pill-a">'+((c.approved||0)+(c.deployed||0))+'</span></td>'
      +'<td><span class="pill pill-r">'+(c.revision||0)+'</span></td>';
    tbody.appendChild(tr);
  });
}

function renderTasks(data){
  var user=Auth.get();var el=document.getElementById('tasks-list');
  if(!data.tasks||!data.tasks.length){el.innerHTML='<div class="no-data">目前沒有交辦事項</div>';return}
  el.innerHTML='';
  data.tasks.forEach(function(t){
    var isAssigned=!t.assignees||t.assignees.indexOf(user.name)>=0;
    var prioClass=t.priority==='high'?'prio-high':t.priority==='medium'?'prio-med':'prio-low';
    var prioLabel=t.priority==='high'?'🔴 緊急':t.priority==='medium'?'🟡 一般':'🟢 低';
    var div=document.createElement('div');div.className='task-card';
    div.style.borderLeft=isAssigned?'4px solid var(--gold)':'4px solid var(--border)';
    var closeBtn=Auth.isAdmin()&&t.status==='open'?'<button class="btn-close-task" onclick="closeTask(\''+t.id+'\')">✓ 標記完成</button>':'';
    div.innerHTML='<div class="task-hdr"><span class="prio '+prioClass+'">'+prioLabel+'</span><span class="task-title">'+escHtml(t.title)+'</span><span class="sbadge '+(t.status==='open'?'s-open':'s-done')+'">'+(t.status==='open'?'進行中':'已完成')+'</span></div>'
      +'<div class="task-body">'+escHtml(t.content)+'</div>'
      +'<div class="task-meta"><span>📅 '+escHtml(t.created)+'</span><span>👤 指派：'+escHtml((t.assignees||['全體']).join('、'))+'</span><span>✍️ '+escHtml(t.author)+'</span>'+closeBtn+'</div>';
    el.appendChild(div);
  });
}

function toggleAddForm(){var f=document.getElementById('add-form');f.style.display=f.style.display==='block'?'none':'block'}

async function saveTask(){
  var title=document.getElementById('new-title').value.trim();
  var content=document.getElementById('new-content').value.trim();
  if(!title){toast('請輸入交辦事項標題','error');return}
  var assignMap={all:['珮瑩','小芬'],peying:['珮瑩'],xiaofen:['小芬']};
  var newTask={id:'task_'+Date.now(),created:new Date().toISOString().slice(0,10),author:'Kevin 主公',title:title,content:content,assignees:assignMap[document.getElementById('new-assign').value],status:'open',priority:document.getElementById('new-prio').value};
  showLoading('儲存交辦事項…');
  try{
    var data=await GH.read('_data/bulletin.json');
    data.tasks.unshift(newTask);
    await GH.write('_data/bulletin.json',data,'Kevin 新增交辦：'+title);
    hideLoading();toast('交辦事項已儲存！');
    document.getElementById('add-form').style.display='none';
    document.getElementById('new-title').value='';document.getElementById('new-content').value='';
    renderTasks(data);
  }catch(e){hideLoading();toast('儲存失敗：'+e.message,'error')}
}

async function closeTask(taskId){
  if(!confirm('確定要將此交辦標記為已完成嗎？'))return;
  showLoading('更新中…');
  try{
    var data=await GH.read('_data/bulletin.json');
    var t=data.tasks.filter(function(x){return x.id===taskId})[0];
    if(t)t.status='done';
    await GH.write('_data/bulletin.json',data,'Kevin 完成交辦：'+(t?t.title:taskId));
    hideLoading();toast('已標記為完成');renderTasks(data);
  }catch(e){hideLoading();toast('更新失敗','error')}
}

function updateNotifBadge(data){
  var lastSeen=Auth.lastSeen();
  var unread=(data.notifications||[]).filter(function(n){return new Date(n.timestamp).getTime()>lastSeen});
  var badge=document.getElementById('notif-count');
  if(unread.length>0){badge.style.display='inline-flex';badge.textContent=unread.length;document.getElementById('mark-all-btn').style.display='block'}
  else{badge.style.display='none';document.getElementById('mark-all-btn').style.display='none'}
}

function renderNotifs(data){
  var notifs=(data.notifications||[]).slice().reverse();
  var lastSeen=Auth.lastSeen();var el=document.getElementById('notif-list');
  if(!notifs.length){el.innerHTML='<div class="no-data">目前沒有動態通知。<br>珮瑩或小芬儲存修改後，通知會顯示在這裡。</div>';return}
  el.innerHTML='';
  notifs.slice(0,20).forEach(function(n){
    var isUnread=new Date(n.timestamp).getTime()>lastSeen;
    var div=document.createElement('div');div.className='notif-item'+(isUnread?' unread':'');
    div.innerHTML='<div class="notif-icon">'+(isUnread?'🔔':'📢')+'</div>'
      +'<div style="flex:1"><div class="notif-text"><strong>'+escHtml(n.user)+'</strong> '+escHtml(n.message)+'</div>'
      +'<div class="notif-time">'+fmtTime(n.timestamp)+'</div></div>';
    el.appendChild(div);
  });
}

function markAllRead(){
  Auth.touchSeen();toast('已標記全部為已讀');
  document.getElementById('notif-count').style.display='none';
  document.getElementById('mark-all-btn').style.display='none';
  document.querySelectorAll('.notif-item.unread').forEach(function(el){
    el.classList.remove('unread');
    var icon=el.querySelector('.notif-icon');if(icon)icon.textContent='📢';
  });
}

function renderHistory(data){
  var el=document.getElementById('hist-list');
  if(!data||!data.length){el.innerHTML='<div class="no-data">尚無修改記錄。<br>珮瑩或小芬第一次儲存修改後，記錄就會出現這裡。</div>';return}
  el.innerHTML='';
  data.slice().reverse().slice(0,30).forEach(function(h){
    var div=document.createElement('div');div.className='hist-item';
    div.innerHTML='<div class="h-avatar">'+escHtml(h.avatar||h.user.charAt(0))+'</div>'
      +'<div class="h-content"><div class="h-action"><strong>'+escHtml(h.user)+'</strong> 修改了「'+escHtml(h.item_name)+'」的 <strong>'+escHtml(h.field_name)+'</strong></div>'
      +'<div class="h-detail" style="margin-bottom:4px">📂 '+escHtml(h.section_name)+' ▸ '+escHtml(h.page_name||'')+'</div>'
      +(h.before?'<span class="diff-before">'+escHtml(h.before.slice(0,80))+(h.before.length>80?'…':'')+'</span>':'')
      +(h.after?'<span class="diff-after">'+escHtml(h.after.slice(0,80))+(h.after.length>80?'…':'')+'</span>':'')
      +'<div class="h-time" style="margin-top:4px">'+fmtTime(h.timestamp)+'</div></div>';
    el.appendChild(div);
  });
}

function renderAdmin(users){
  var tbody=document.getElementById('user-tbody');tbody.innerHTML='';
  Object.keys(users).forEach(function(key){
    var u=users[key];
    var tr=document.createElement('tr');
    tr.innerHTML='<td style="font-family:monospace;color:#666">'+escHtml(key)+'</td>'
      +'<td>'+escHtml(u.name)+'</td>'
      +'<td class="'+(u.role==='admin'?'role-admin':'role-editor')+'">'+(u.role==='admin'?'👑 管理員':'✏️ 編輯者')+'</td>'
      +'<td><span class="pw-cell" id="pw-'+escHtml(key)+'">'+escHtml(u.password)+'</span></td>'
      +'<td><button class="reset-pw" onclick="editPw(\''+escHtml(key)+'\',\''+escHtml(u.password)+'\')">修改密碼</button></td>';
    tbody.appendChild(tr);
  });
}

// 密碼修改 Modal
var _pwTarget=null,_pwCurrent=null;
function editPw(key,currentPw){
  _pwTarget=key;_pwCurrent=currentPw;
  document.getElementById('pw-modal-label').textContent='修改「'+key+'」的密碼（目前：'+currentPw+'）';
  document.getElementById('pw-modal-input').value='';
  document.getElementById('pw-modal').classList.add('show');
  setTimeout(function(){document.getElementById('pw-modal-input').focus()},150);
}
function closePwModal(){document.getElementById('pw-modal').classList.remove('show');_pwTarget=null;_pwCurrent=null}
async function confirmPwChange(){
  var newPw=document.getElementById('pw-modal-input').value.trim();
  if(!newPw){toast('請輸入新密碼','error');return}
  if(newPw===_pwCurrent){toast('新密碼與舊密碼相同','error');return}
  var key=_pwTarget;closePwModal();
  showLoading('更新密碼…');
  try{
    var users=await GH.read('_data/users.json');
    users[key].password=newPw;
    await GH.write('_data/users.json',users,'Kevin 修改用戶密碼：'+key);
    hideLoading();toast('密碼已更新');
    var el=document.getElementById('pw-'+key);if(el)el.textContent=newPw;
  }catch(e){hideLoading();toast('更新失敗：'+e.message,'error')}
}

async function bootApp(){
  var user=Auth.get();if(!user)return;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('hdr-user').textContent=user.name;
  if(Auth.isAdmin()){
    document.getElementById('add-task-btn').style.display='block';
    document.getElementById('admin-sec').style.display='block';
  }
  showLoading('讀取專案資料…');
  try{
    var results=await Promise.all([
      GH.read('_data/bulletin.json'),
      GH.read('_data/history.json'),
      GH.read('_data/content-service.json'),
      GH.read('_data/content-meta.json'),
      Auth.isAdmin()?GH.read('_data/users.json'):Promise.resolve(null)
    ]);
    var bulletin=results[0],history=results[1],svcData=results[2],metaData=results[3],users=results[4];
    hideLoading();
    renderStats(svcData,metaData);
    renderProgress(svcData,metaData);
    renderTasks(bulletin);
    renderNotifs(bulletin);
    renderHistory(history);
    updateNotifBadge(bulletin);
    if(Auth.isAdmin()&&users)renderAdmin(users);
  }catch(e){
    hideLoading();
    toast('讀取資料失敗：'+e.message,'error',5000);
    console.error(e);
  }
}

// 啟動：若已登入則直接進入
(function(){var user=Auth.get();if(user)bootApp()})();
</script>
